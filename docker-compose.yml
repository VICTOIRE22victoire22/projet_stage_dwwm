version: "3.9"

services:
  php:
    build: .
    container_name: php_stage
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:80"
    command: /bin/bash -c "chmod -R 755 /var/www/html && chown -R www-data:www-data /var/www/html && apache2-foreground"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_stage
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stage_dwwm
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma_stage
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  mysql_data:
